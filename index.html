<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineGo | Home</title>
    <style>
        /* Estilo Minimalista BlueskyTeam */
        body { 
            background-color: #f2f2f2; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Container do Cabeçalho Animado */
        .header-container { 
            position: absolute; 
            top: 20%; 
            text-align: center; 
            width: 100%; 
            height: 50px; 
        }

        .header-text { 
            font-size: 38px; 
            font-weight: 900; 
            color: #1a1a1a; 
            position: absolute; 
            width: 100%; 
            left: 0; 
            opacity: 0; 
            letter-spacing: -1px;
        }

        /* Animação de Ciclo */
        .bst-text { animation: cycle 8s ease-in-out infinite; }
        .lg-text { animation: cycle 8s ease-in-out infinite 4s; }

        @keyframes cycle {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            45% { opacity: 1; }
            50% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 0; }
        }

        /* Campo de Busca */
        .search-box { 
            width: 85%; 
            max-width: 500px;
            padding: 18px; 
            border-radius: 20px; 
            border: none; 
            outline: none; 
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 16px;
            transition: 0.3s;
        }

        .search-box:focus {
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-text bst-text">BlueskySTP2</div>
        <div class="header-text lg-text">LineGo</div>
    </div>

    <input type="text" id="search" class="search-box" placeholder="Pesquisar ou digitar URL..." autofocus>

    <script>
        const searchInput = document.getElementById('search');

        searchInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                let query = this.value.trim();
                if (query === "") return;

                // Lógica de Navegação: Se tiver ponto e não tiver espaço, trata como URL
                if (query.includes('.') && !query.includes(' ')) {
                    let url = query.startsWith('http') ? query : 'https://' + query;
                    window.location.href = url;
                } else {
                    // Senão, faz busca no Google
                    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                }
            }
        };
    </script>
</body>
</html>
