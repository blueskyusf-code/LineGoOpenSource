<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - BST | LineGo</title>
    <style>
        body {
            background-color: #f2f2f2;
            color: #333333;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Remove o destaque azul de toque em dispositivos móveis */
            -webkit-tap-highlight-color: transparent;
        }

        .header-container {
            position: absolute;
            top: 50px;
            text-align: center;
            width: 100%;
            height: 40px;
        }

        .header-text {
            font-size: 28px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -1px;
            position: absolute;
            width: 100%;
            left: 0;
            opacity: 0;
        }

        .bst-text { animation: headerMasterCycle 8s ease-in-out infinite; }
        .lg-text { animation: headerMasterCycle 8s ease-in-out infinite 4s; }

        .container { text-align: center; }

        .error-code {
            font-size: 180px;
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            background: linear-gradient(135deg, #444444 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.15));
            animation: float 4s ease-in-out infinite;
            /* Mantém o cursor padrão para não denunciar que é clicável */
            cursor: default;
            user-select: none;
        }

        .message {
            font-size: 26px;
            font-weight: 800;
            margin-top: 25px;
            color: #4a4a4a;
            display: inline-block;
            animation: fullCycle 5s ease-in-out infinite;
        }

        .bar {
            width: 90px;
            height: 7px;
            background: linear-gradient(90deg, #333333, #777777);
            margin: 30px auto 0;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes headerMasterCycle {
            0% { opacity: 0; transform: scale(0.8) translateY(-10px); }
            10% { opacity: 1; transform: scale(1) translateY(0); }
            25% { transform: scale(1); color: #1a1a1a; }
            30% { transform: scale(1.1); color: #555; text-shadow: 0 0 8px rgba(0,0,0,0.2); }
            35% { transform: scale(1); color: #1a1a1a; }
            45% { opacity: 1; transform: translateX(0); }
            50% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fullCycle {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            10% { opacity: 1; transform: scale(1.1) translateY(0); }
            15% { transform: scale(1); }
            45% { transform: scale(1); color: #4a4a4a; }
            50% { transform: scale(1.05); color: #000000; text-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
            55% { transform: scale(1); color: #4a4a4a; }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-text bst-text">BlueskyCode</div>
        <div class="header-text lg-text">LineGo</div>
    </div>

    <div class="container">
        <div class="error-code" id="trigger">404</div>
        <div class="message">Ops! Page not Found</div>
        <div class="bar"></div>
    </div>

    <script>
        // O segredo via JavaScript:
        document.getElementById('trigger').addEventListener('click', function() {
            // Manda para o link que seu Java intercepta
            window.location.href = "http://localhost:8158/game.html";
        });
    </script>

</body>
</html>
